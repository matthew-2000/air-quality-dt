project:
  name: unisa-air-quality-digital-twin
  timezone: Europe/Rome

paths:
  raw_dir: data/raw
  processed_dir: data/processed

campus:
  place_name: "Università degli Studi di Salerno, Fisciano, Italy"
  fallback_latitude: 40.771
  fallback_longitude: 14.790
  fallback_distance_m: 1200

arpac:
  portal_url: "https://dati.arpacampania.it/"
  station_metadata_url: "https://dati.arpacampania.it/dataset/96eba21b-4191-4985-9205-e3b1800ad42a/resource/28bce378-02fe-4ff0-bc09-f598378389e6/download/metadati-stazioni-rqa-1.csv"
  station_radius_km: 40
  resource_limit_per_dataset: 1
  datasets:
    - id: dati-grezzi-orari-qualita-aria
      page_url: "https://dati.arpacampania.it/dataset/dati-grezzi-orari-qualita-aria"
      kind: nrt_hourly_raw
    - id: dati-rqa-giornalieri-validati
      page_url: "https://dati.arpacampania.it/dataset/dati-rqa-giornalieri-validati"
      kind: validated_daily
    - id: dati-monitoraggio-qualita-aria
      page_url: "https://dati.arpacampania.it/dataset/dati-monitoraggio-qualita-aria"
      kind: historical
    - id: rete-di-monitoraggio-della-qualita-dell-aria
      page_url: "https://dati.arpacampania.it/dataset/rete-di-monitoraggio-della-qualita-dell-aria"
      kind: station_metadata

weather:
  unisa_page_url: "https://web.unisa.it/servizi-on-line/stazione-meteo"
  open_meteo_url: "https://api.open-meteo.com/v1/forecast"
  hourly_variables:
    - temperature_2m
    - relative_humidity_2m
    - precipitation
    - wind_speed_10m
    - wind_direction_10m

model:
  pollutants: ["pm10", "pm25", "no2", "o3"]
  idw_power: 2.0
  coefficients:
    traffic:
      no2: 8.0
      pm10: 4.0
      pm25: 2.5
      o3: -1.0
    green:
      no2: 2.0
      pm10: 2.5
      pm25: 1.5
      o3: 0.0
    wind:
      no2: -1.5
      pm10: -1.2
      pm25: -0.8
      o3: 0.3
    rain:
      pm10: -3.0
      pm25: -2.0
      no2: 0.0
      o3: 0.0

validation:
  max_hours: 168
