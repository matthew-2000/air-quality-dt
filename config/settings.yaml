project:
  name: unisa-air-quality-digital-twin
  timezone: Europe/Rome

paths:
  raw_dir: data/raw
  processed_dir: data/processed

campus:
  place_name: "Università degli Studi di Salerno, Fisciano, Italy"
  fallback_latitude: 40.771
  fallback_longitude: 14.790
  fallback_distance_m: 1200

live_sensors:
  broker:
    host_env: UNISA_MQTT_HOST
    port_env: UNISA_MQTT_PORT
    username_env: UNISA_MQTT_USERNAME
    password_env: UNISA_MQTT_PASSWORD
    topic_env: UNISA_MQTT_TOPIC
  snapshots:
    bucket_minutes: 1
    freshness_minutes: 5
  raw:
    sensor_metadata_path: data/raw/live_sensors/sensor_catalog.json
    mqtt_csv_path: data/raw/live_sensors/mqtt_data.csv
    mqtt_jsonl_path: data/raw/live_sensors/mqtt_raw.jsonl

model:
  pollutants: ["pm1", "pm25", "pm10", "voc_index", "nox_index"]
  idw_power: 2.0
  coefficients:
    traffic:
      nox_index: 8.0
      no2: 8.0
      pm10: 4.0
      pm25: 2.5
      pm1: 1.5
      voc_index: 2.0
      o3: -1.0
    green:
      nox_index: 2.0
      no2: 2.0
      pm10: 2.5
      pm25: 1.5
      pm1: 1.0
      voc_index: 0.5
      o3: 0.0
    wind:
      nox_index: -1.5
      no2: -1.5
      pm10: -1.2
      pm25: -0.8
      pm1: -0.5
      voc_index: -0.2
      o3: 0.3
    rain:
      pm10: -3.0
      pm25: -2.0
      pm1: -1.5
      no2: 0.0
      nox_index: 0.0
      voc_index: 0.0
      o3: 0.0
